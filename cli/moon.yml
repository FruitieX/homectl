$schema: 'https://moonrepo.dev/schemas/tasks.json'

tasks:
  build:
    command: 'cargo build -p homectl-cli'
    inputs:
      - 'src/**/*'
      - 'Cargo.toml'
    options:
      runInCI: true

  build-release:
    command: 'cargo build -p homectl-cli --release'
    inputs:
      - 'src/**/*'
      - 'Cargo.toml'
